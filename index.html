<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apitv screen PRO</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0a0a0a; --card: #161616; --header-bg: #000; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-top: 135px; display: flex; flex-direction: column; align-items: center; }
        
        /* CABEÇALHO SUPERIOR */
        .main-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            background: var(--header-bg); 
            z-index: 1001; 
            border-bottom: 2px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            box-sizing: border-box;
        }

        .header-title { color: var(--primary); margin: 0; font-size: 18px; letter-spacing: 2px; font-weight: bold; text-transform: uppercase; }

        .btn-privado-header {
            background: #111;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        /* BARRA DE GÊNEROS ABAIXO DO CABEÇALHO */
        .genre-bar {
            position: fixed;
            top: 60px; 
            left: 0;
            width: 100%;
            background: #0d0d0d;
            z-index: 1000;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .tabs-container { 
            display: flex; 
            gap: 12px; 
            overflow-x: auto; 
            scrollbar-width: none; 
            padding: 0 15px;
        }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { 
            background: #222; 
            color: #777; 
            border: 1px solid #333; 
            padding: 10px 22px; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold; 
            white-space: nowrap; 
            font-size: 13px;
            transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: black; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 255, 136, 0.4); }

        .container { width: 95%; max-width: 850px; padding: 10px; }
        
        .player-card { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #videoPlayer { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; border: 2px solid #333; display: none; aspect-ratio: 16/9; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 15px; width: 100%; }
        .channel-item { background: var(--card); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; border: 1px solid #222; transition: 0.3s; }
        .channel-item:hover { border-color: var(--primary); transform: scale(1.05); }
        .channel-item img { width: 70px; height: 70px; object-fit: contain; margin-bottom: 10px; border-radius: 10px; background: #000; }
        .channel-item p { font-size: 11px; margin: 0; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        #status-msg { font-size: 10px; color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* PAINEL PRIVADO */
        #private-panel { display: none; background: #0f0f0f; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; margin-top: 20px; }
        input { width: 90%; padding: 15px; margin: 12px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-play { background: var(--primary); color: black; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 95%; font-size: 14px; text-transform: uppercase; margin-top: 15px; }
    </style>
</head>
<body>

    <header class="main-header">
        <h1 class="header-title">APITV SCREEN</h1>
        <button class="btn-privado-header" onclick="acessoSeguro()">USUÁRIO PRIVADO</button>
    </header>

    <nav class="genre-bar">
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('Vidyou Tv Aberta', this)">Vidyou Tv Aberta</button>
            <button class="tab-btn" onclick="switchTab('Vidyou Variedades', this)">Vidyou Variedades</button>
            <button class="tab-btn" onclick="switchTab('Vidyou Kids', this)">Vidyou Kids</button>
        </div>
    </nav>

    <div class="container">
        <div class="player-card">
            <div id="status-msg">Iniciando Sincronização Cloud...</div>
            <video id="videoPlayer" controls playsinline></video>
        </div>

        <div id="channelDisplay" class="channel-grid"></div>

        <div id="private-panel">
            <h3 style="margin: 0; color: var(--primary);">Gerenciador de Lista</h3>
            <p style="font-size: 12px; color: #666; margin-bottom: 20px;">Sincronização via netchaveapi</p>
            
            <input type="text" id="listName" placeholder="Nome da Lista">
            <input type="text" id="listUrl" placeholder="URL da Lista M3U8">
            <button class="btn-play" onclick="saveAndSync()">ATUALIZAR SISTEMA</button>

            <div id="active-list-info" style="display:none; margin-top: 25px; border-top: 1px solid #222; padding-top: 20px;">
                <span id="currentListName" style="font-weight: bold; font-size: 16px;"></span><br><br>
                <button style="color:#ff4444; background:none; border:1px solid #ff4444; padding: 8px 15px; border-radius: 5px; cursor:pointer; font-size: 11px;" onclick="deleteList()">LIMPAR NUVEM</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "AIza58AfRp1KcBIxoobHdZ2gFzL4WesjLpWWTmB";
        const DB_URL = "https://netbase-cloud-default-rtdb.firebaseio.com/listas";
        const ID_ACESSO = "netchaveapi";
        
        let hls = new Hls();
        const video = document.getElementById('videoPlayer');
        let allChannels = [];
        let currentCategory = 'Vidyou Tv Aberta';
        let currentListId = null;

        function acessoSeguro() {
            const id = prompt("Digite o ID Único:");
            if (id === ID_ACESSO) {
                switchTab('privado', document.querySelector('.btn-privado-header'));
            } else {
                alert("ID incorreto.");
            }
        }

        function switchTab(category, btn) {
            currentCategory = category;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(category !== 'privado') btn.classList.add('active');

            const grid = document.getElementById('channelDisplay');
            const panel = document.getElementById('private-panel');

            if (category === 'privado') {
                grid.style.display = 'none';
                panel.style.display = 'block';
            } else {
                grid.style.display = 'grid';
                panel.style.display = 'none';
                renderChannels();
            }
        }

        function playChannel(url, name) {
            video.style.display = "block";
            document.getElementById('status-msg').innerText = "LIVE: " + name;
            if (Hls.isSupported()) {
                hls.destroy(); hls = new Hls();
                hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url; video.play();
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveAndSync() {
            const n = document.getElementById('listName').value;
            const u = document.getElementById('listUrl').value;
            if (!n || !u) return alert("Preencha todos os campos.");
            await fetch(`${DB_URL}.json?auth=${API_KEY}`, { method: 'POST', body: JSON.stringify({ nome: n, url: u }) });
            location.reload();
        }

        async function loadCloud() {
            try {
                const res = await fetch(`${DB_URL}.json?auth=${API_KEY}`);
                const data = await res.json();
                if (data) {
                    const keys = Object.keys(data);
                    currentListId = keys[keys.length - 1];
                    const list = data[currentListId];
                    document.getElementById('currentListName').innerText = "Grade Ativa: " + list.nome;
                    document.getElementById('active-list-info').style.display = "block";
                    document.getElementById('status-msg').innerText = "Sincronizado";
                    parseM3U(list.url);
                }
            } catch (e) { document.getElementById('status-msg').innerText = "Erro Cloud"; }
        }

        async function parseM3U(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const lines = text.split('\n');
                allChannels = [];
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].includes('#EXTINF:')) {
                        const name = lines[i].split(',')[1] || "Canal";
                        const streamUrl = lines[i+1]?.trim();
                        const logo = lines[i].match(/tvg-logo="([^"]+)"/)?.[1] || "";
                        const group = lines[i].match(/group-title="([^"]+)"/)?.[1]?.toLowerCase() || "";
                        if(streamUrl?.startsWith('http')) allChannels.push({ name, url: streamUrl, logo, group });
                    }
                }
                renderChannels();
            } catch (e) {}
        }

        function renderChannels() {
            const display = document.getElementById('channelDisplay');
            display.innerHTML = '';
            
            const filtered = allChannels.filter(c => {
                const n = c.name.toLowerCase();
                const g = c.group;
                
                if (currentCategory === 'Vidyou Kids') {
                    return n.includes('kids') || n.includes('desenho') || n.includes('disney') || g.includes('kids') || g.includes('infantil');
                } else if (currentCategory === 'Vidyou Variedades') {
                    return n.includes('filme') || n.includes('serie') || n.includes('hbo') || n.includes('cine') || g.includes('variedades') || g.includes('movies');
                } else if (currentCategory === 'Vidyou Tv Aberta') {
                    const isKids = n.includes('kids') || g.includes('kids');
                    const isMovie = n.includes('filme') || n.includes('cine') || g.includes('movies');
                    return (!isKids && !isMovie) || g.includes('aberta') || g.includes('geral');
                }
                return false;
            });

            filtered.forEach(c => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.onclick = () => playChannel(c.url, c.name);
                div.innerHTML = `<img src="${c.logo || 'https://via.placeholder.com/70/111/00ff88?text=TV'}"><p>${c.name}</p>`;
                display.appendChild(div);
            });
        }

        async function deleteList() {
            if (currentListId && confirm("Deletar lista da nuvem?")) {
                await fetch(`${DB_URL}/${currentListId}.json?auth=${API_KEY}`, { method: 'DELETE' });
                location.reload();
            }
        }

        window.onload = loadCloud;
    </script>
</body>
</html>
